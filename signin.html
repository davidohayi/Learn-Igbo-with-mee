<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Igbo Kwenu</title>
    <link rel="shortcut icon" href="LIWI.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="signin.css">
    <script src="registration.js"></script>
</head>
<body>

    <div class="login-card">

        <div class="card-header">
            <div class="brand">
                <img src="LIWI.png" alt="Igbo Kwenu Logo">
                <span class="brand-name">IGBO KWENU</span>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to continue your Igbo journey</p>
        </div>

        <div class="card-body">
            <form id="loginForm">

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" id="togglePassword">👁</button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login">Sign In →</button>
                <div class="gold-bar"></div>

            </form>

            <p class="register-link">Don't have an account? <a href="Registration.html">Register Now</a></p>
        </div>

    </div>

    
</body>
</html>
