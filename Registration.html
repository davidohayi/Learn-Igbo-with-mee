<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration — Igbo Kwenu</title>
    <link rel="shortcut icon" href="LIWI.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="registration.css">
    <script src="registration.js"></script>
</head>
<body>

    <div class="registration-card">

        <div class="card-header">
            <div class="brand">
                <img src="LIWI.png" alt="Igbo Kwenu Logo">
                <span class="brand-name">IGBO KWENU</span>
            </div>
            <h1>Join Our Community</h1>
            <p>Start your Igbo language journey today</p>
        </div>

        <div class="card-body">
            <form action="submit_registration.php" method="post">

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" name="firstname" placeholder="Ada" required>
                    </div>
                    <div class="form-group">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" name="lastname" placeholder="Okafor" required>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a strong password" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
                </div>

                <button type="submit" class="btn-register">Create My Account →</button>
                <div class="gold-bar"></div>

            </form>

            <p class="login-link">Already have an account? <a href="signin.html">Sign in</a></p>
        </div>

    </div>

</body>
</html>
